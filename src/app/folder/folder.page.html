<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>{{ folder }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="fondo">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">{{ folder }}</ion-title>
    </ion-toolbar>
  </ion-header>

  <app-home *ngIf="folder=='Home'"></app-home>
  <app-private-animes *ngIf="folder=='MyAnimes'"></app-private-animes>
  <app-generos *ngIf="folder=='Genres'"></app-generos>
  <app-about *ngIf="folder=='About'"></app-about>
</ion-content>
