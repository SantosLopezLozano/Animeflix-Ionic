<ion-item-sliding #sliding [disabled]="!isLowResolution()">
  <ion-item>
    <p>{{genero?.name}}</p>
    <ion-icon name="link-outline"></ion-icon>
    <ion-avatar class="task">
      <img *ngIf="getPublicAnime()?.picture" [src]="getPublicAnime()" />
    </ion-avatar>
    <ion-avatar class="person">
      <img *ngIf="getPrivateAnime()?.picture" [src]="getPrivateAnime()" />
    </ion-avatar>
  </ion-item>
</ion-item-sliding>
