<ion-item-sliding #sliding [disabled]="!isLowResolution()">
  <p>
    <ion-card class="task">
      <img *ngIf="getPublicAnime()?.picture" [src]="getPublicAnime()?.picture" />
      <img *ngIf="getPrivateAnime()?.picture" [src]="getPrivateAnime()?.picture" />
      <p>{{ genero?.name}} {{genero?.secondName}}</p>
    </ion-card>
  </p>
</ion-item-sliding>
